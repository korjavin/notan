version: "3.8"
services:
  notan:
    image: ghcr.io/korjavin/notan:0bba78570db78d15323465c41f13b6a57cb02539
    container_name: notan
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME:-traefik_default}"
      - "traefik.http.routers.notan.rule=Host(`${HOSTNAME}`)"
      - "traefik.http.routers.notan.entrypoints=websecure"
      - "traefik.http.routers.notan.middlewares=${TRAEFIK_MIDDLEWARES:-auth-errors@docker,forward-auth@docker}"
      - "traefik.http.routers.notan.tls=true"
      - "traefik.http.routers.notan.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.notan.loadbalancer.server.port=3000"
    restart: unless-stopped
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
networks:
  traefik_network:
    external: true
    name: ${TRAEFIK_NETWORK_NAME:-traefik_default}
